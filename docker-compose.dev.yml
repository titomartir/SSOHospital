services:
  db:
    image: postgres:15-alpine
    container_name: sso_dev_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: SSOHospital2024
      POSTGRES_DB: SSO
    ports:
      - "5435:5432"
    volumes:
      - sso_dev_postgres_data:/var/lib/postgresql/data
      - ./backend-SSSO/src/db/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
      - ./backend-SSSO/src/db/migrate_estructura_organizacional.sql:/docker-entrypoint-initdb.d/02_migrate_estructura_organizacional.sql:ro
      - ./backend-SSSO/src/db/migrate_puestos_funciones_relacion.sql:/docker-entrypoint-initdb.d/03_migrate_puestos_funciones_relacion.sql:ro
      - ./backend-SSSO/src/db/migrate_riesgo_peligro_relacion.sql:/docker-entrypoint-initdb.d/04_migrate_riesgo_peligro_relacion.sql:ro
      - ./backend-SSSO/src/db/migrate_matriz_jerarquica.sql:/docker-entrypoint-initdb.d/05_migrate_matriz_jerarquica.sql:ro
      - ./backend-SSSO/src/db/migrate_matriz_riesgo_bloques.sql:/docker-entrypoint-initdb.d/06_migrate_matriz_riesgo_bloques.sql:ro
      - ./backend-SSSO/src/db/migrate_matriz_maestro_detalle.sql:/docker-entrypoint-initdb.d/07_migrate_matriz_maestro_detalle.sql:ro
      - ./backend-SSSO/src/db/migrate_matriz_funciones_jerarquia.sql:/docker-entrypoint-initdb.d/08_migrate_matriz_funciones_jerarquia.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser -d SSO"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - sso_dev_net

  backend:
    image: node:20-alpine
    container_name: sso_dev_backend
    restart: unless-stopped
    working_dir: /app
    environment:
      NODE_ENV: development
      PORT: 3000
      DB_USER: appuser
      DB_PASSWORD: SSOHospital2024
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: SSO
    command: sh -c "npm install && npm run dev -- -L"
    volumes:
      - ./backend-SSSO:/app
      - sso_dev_backend_node_modules:/app/node_modules
    ports:
      - "3100:3000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - sso_dev_net

  frontend:
    image: node:20-alpine
    container_name: sso_dev_frontend
    restart: unless-stopped
    working_dir: /app
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      VITE_PROXY_TARGET: http://backend:3000
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    volumes:
      - ./frontend-SSO:/app
      - sso_dev_frontend_node_modules:/app/node_modules
    ports:
      - "5178:5173"
    depends_on:
      backend:
        condition: service_started
    networks:
      - sso_dev_net

  pgadmin:
    image: dpage/pgadmin4
    container_name: sso_dev_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5053:80"
    volumes:
      - sso_dev_pgadmin_data:/var/lib/pgadmin
    depends_on:
      db:
        condition: service_healthy
    networks:
      - sso_dev_net

volumes:
  sso_dev_postgres_data:
  sso_dev_backend_node_modules:
  sso_dev_frontend_node_modules:
  sso_dev_pgadmin_data:

networks:
  sso_dev_net:
    driver: bridge
